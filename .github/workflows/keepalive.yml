name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          echo "Pinging Render service..."
          curl -L --max-time 60 --retry 2 --retry-delay 5 https://gold-price-report.onrender.com/health || echo "Ping failed, Render may be sleeping or temporarily unavailable."
